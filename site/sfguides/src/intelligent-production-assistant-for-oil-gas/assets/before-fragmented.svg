<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="scadaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="finGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="#0F172A"/>
  
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F8FAFC" text-anchor="middle">BEFORE: Fragmented Truth</text>
  
  <rect x="80" y="60" width="160" height="80" rx="8" fill="url(#scadaGrad)"/>
  <text x="160" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SCADA</text>
  <text x="160" y="115" font-family="Arial, sans-serif" font-size="12" fill="#BFDBFE" text-anchor="middle">(Sensors)</text>
  
  <rect x="320" y="60" width="160" height="80" rx="8" fill="url(#docsGrad)"/>
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Documents</text>
  <text x="400" y="115" font-family="Arial, sans-serif" font-size="12" fill="#A7F3D0" text-anchor="middle">(Reports)</text>
  
  <rect x="560" y="60" width="160" height="80" rx="8" fill="url(#finGrad)"/>
  <text x="640" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Financials</text>
  <text x="640" y="115" font-family="Arial, sans-serif" font-size="12" fill="#FDE68A" text-anchor="middle">(Actuals)</text>
  
  <line x1="160" y1="140" x2="160" y2="200" stroke="#64748B" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="160,210 155,200 165,200" fill="#64748B"/>
  
  <line x1="400" y1="140" x2="400" y2="200" stroke="#64748B" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="400,210 395,200 405,200" fill="#64748B"/>
  
  <line x1="640" y1="140" x2="640" y2="200" stroke="#64748B" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="640,210 635,200 645,200" fill="#64748B"/>
  
  <rect x="110" y="220" width="100" height="60" rx="8" fill="url(#personGrad)"/>
  <text x="160" y="255" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Eng A</text>
  
  <rect x="350" y="220" width="100" height="60" rx="8" fill="url(#personGrad)"/>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Eng B</text>
  
  <rect x="590" y="220" width="100" height="60" rx="8" fill="url(#personGrad)"/>
  <text x="640" y="255" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Eng C</text>
  
  <text x="160" y="310" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-style="italic">"I see fluid pound"</text>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-style="italic">"I found a note"</text>
  <text x="640" y="310" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-style="italic">"Budget is blown"</text>
  
  <line x1="100" y1="350" x2="700" y2="350" stroke="#EF4444" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#EF4444" text-anchor="middle">NO CONNECTION</text>
</svg>