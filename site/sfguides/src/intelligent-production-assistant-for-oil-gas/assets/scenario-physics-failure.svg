<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="320" fill="#0F172A"/>
  
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Scenario 1: Physics Failure (Rod Pump)</text>
  
  <rect x="30" y="50" width="180" height="50" rx="6" fill="#1E40AF"/>
  <text x="120" y="70" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">USER QUERY</text>
  <text x="120" y="88" font-family="Arial, sans-serif" font-size="9" fill="#93C5FD" text-anchor="middle">"What caused Well-RP-05?"</text>
  
  <line x1="210" y1="75" x2="250" y2="75" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="260,75 250,70 250,80" fill="#64748B"/>
  
  <rect x="270" y="50" width="180" height="50" rx="6" fill="#7C3AED"/>
  <text x="360" y="70" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">CORTEX ANALYST</text>
  <text x="360" y="88" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="middle">SELECT FROM TAG_HISTORY</text>
  
  <line x1="450" y1="75" x2="490" y2="75" stroke="#64748B" stroke-width="2"/>
  <polygon points="500,75 490,70 490,80" fill="#64748B"/>
  
  <rect x="510" y="50" width="180" height="50" rx="6" fill="#065F46"/>
  <text x="600" y="70" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">RESULT</text>
  <text x="600" y="88" font-family="Arial, sans-serif" font-size="9" fill="#6EE7B7" text-anchor="middle">DYN_LOAD = 0 (rod part)</text>
  
  <line x1="600" y1="100" x2="600" y2="130" stroke="#64748B" stroke-width="2"/>
  <polygon points="600,140 595,130 605,130" fill="#64748B"/>
  
  <rect x="510" y="150" width="180" height="50" rx="6" fill="#14532D"/>
  <text x="600" y="170" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">CORTEX SEARCH</text>
  <text x="600" y="188" font-family="Arial, sans-serif" font-size="9" fill="#86EFAC" text-anchor="middle">"Well-RP-05 failure analysis"</text>
  
  <line x1="510" y1="175" x2="470" y2="175" stroke="#64748B" stroke-width="2"/>
  <polygon points="460,175 470,170 470,180" fill="#64748B"/>
  
  <rect x="270" y="150" width="180" height="50" rx="6" fill="#065F46"/>
  <text x="360" y="170" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">DOCUMENT RETRIEVED</text>
  <text x="360" y="188" font-family="Arial, sans-serif" font-size="9" fill="#6EE7B7" text-anchor="middle">Pump Failure Analysis</text>
  
  <line x1="270" y1="175" x2="230" y2="175" stroke="#64748B" stroke-width="2"/>
  <line x1="230" y1="175" x2="230" y2="250" stroke="#64748B" stroke-width="2"/>
  <line x1="230" y1="250" x2="270" y2="250" stroke="#64748B" stroke-width="2"/>
  <polygon points="280,250 270,245 270,255" fill="#64748B"/>
  
  <rect x="290" y="225" width="420" height="70" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10B981" text-anchor="middle">AGENT RESPONSE</text>
  <text x="500" y="270" font-family="Arial, sans-serif" font-size="10" fill="#6EE7B7" text-anchor="middle">"Well-RP-05 failed due to rod parting at 2,000 ft. Root cause: Gas</text>
  <text x="500" y="285" font-family="Arial, sans-serif" font-size="10" fill="#6EE7B7" text-anchor="middle">interference caused fluid pound. Confirmed by tech note."</text>
