name: Publish manifest to manifests branch

on:
  workflow_dispatch: {}
  pull_request:
    branches: [ master ]
  schedule:
    # Run around 23:59 America/Los_Angeles accounting for DST.
    - cron: "59 06 * * *"  # 23:59 PT during Daylight Time (UTC-7)
    - cron: "59 07 * * *"  # 23:59 PT during Standard Time (UTC-8)

permissions:
  id-token: write
  contents: read

jobs:
  publish-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # generator reads git history; pushing needs tags/branches

      - name: Check Pacific time (23:59)
        id: gate
        run: |
          NOW=$(TZ=America/Los_Angeles date +'%H:%M')
          echo "Now (America/Los_Angeles): $NOW"
          if [ "$NOW" = "23:59" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.run == 'true' || github.event_name != 'schedule'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate manifest
        if: steps.gate.outputs.run == 'true' || github.event_name != 'schedule'
        run: |
          python3 "scripts/generate_manifest/manifest_generator.py"

      - name: Upload manifest as artifact
        if: steps.gate.outputs.run == 'true' || github.event_name != 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-manifest-${{ github.sha }}
          path: site/sfguides/src/_shared_assets/quickstart-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.run == 'true' || (github.event_name != 'schedule' && github.ref == 'refs/heads/master')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Upload to S3 (latest and versioned)
        if: steps.gate.outputs.run == 'true' || (github.event_name != 'schedule' && github.ref == 'refs/heads/master')
        env:
          BUCKET: ${{ vars.MANIFEST_S3_BUCKET }}
          PREFIX: ${{ vars.MANIFEST_S3_PREFIX }}
        run: |
          set -euo pipefail
          PREFIX="${PREFIX:-}"
          if [ -n "$PREFIX" ] && [ "${PREFIX%/}" = "$PREFIX" ]; then PREFIX="${PREFIX}/"; fi
          FILE="site/sfguides/src/_shared_assets/quickstart-manifest.json"
          LATEST="s3://${BUCKET}/${PREFIX}quickstart-manifest.json"
          VERSIONED="s3://${BUCKET}/${PREFIX}quickstart-manifest-${GITHUB_SHA}.json"
          echo "Uploading $FILE to $LATEST and $VERSIONED"
          aws s3 cp "$FILE" "$LATEST" --content-type "application/json; charset=utf-8"
          aws s3 cp "$FILE" "$VERSIONED" --content-type "application/json; charset=utf-8"

