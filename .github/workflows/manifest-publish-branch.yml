name: Publish manifest to manifests branch

on:
  workflow_dispatch: {}
  schedule:
    # Run around 23:59 America/Los_Angeles accounting for DST.
    - cron: "59 06 * * *"  # 23:59 PT during Daylight Time (UTC-7)
    - cron: "59 07 * * *"  # 23:59 PT during Standard Time (UTC-8)

permissions:
  contents: read

jobs:
  publish-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # generator reads git history; pushing needs tags/branches

      - name: Check Pacific time (23:59)
        id: gate
        run: |
          NOW=$(TZ=America/Los_Angeles date +'%H:%M')
          echo "Now (America/Los_Angeles): $NOW"
          if [ "$NOW" = "23:59" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.gate.outputs.run == 'true' || github.event_name != 'schedule'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up Python
        if: steps.gate.outputs.run == 'true' || github.event_name != 'schedule'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        if: steps.gate.outputs.run == 'true' || github.event_name != 'schedule'
        run: pip install boto3

      - name: Generate manifest
        if: steps.gate.outputs.run == 'true' || github.event_name != 'schedule'
        env:
          MANIFEST_S3_BUCKET: ${{ secrets.MANIFEST_S3_BUCKET }}
          MANIFEST_S3_PREFIX: ${{ secrets.MANIFEST_S3_PREFIX }}
        run: |
          python3 "scripts/generate_manifest/manifest generator.py"


