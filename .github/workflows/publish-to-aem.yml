name: Publish Quickstart to AEM

on:
  workflow_call:
    inputs:
      quickstart_name:
        description: 'Name of the quickstart folder'
        required: true
        type: string
      language:
        description: 'Language code (en, es, it, fr, de, ja, ko, pt_br)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA for reference'
        required: true
        type: string
    secrets:
      AEM_USERNAME:
        description: 'AEM username for basic auth'
        required: true
      AEM_PASSWORD:
        description: 'AEM password for basic auth'
        required: true
      AEM_AUTHOR_URL:
        description: 'AEM author instance URL'
        required: true
      AEM_PUBLISH_URL:
        description: 'AEM publish instance URL'
        required: true

env:
  BASE_CF_PATH: /content/dam/snowflake-site/en/content-fragments/base-fragments/base-quickstart-cf
  CF_DEST_PATH: /content/dam/snowflake-site
  PAGE_BASE_PATH: /content/snowflake-site/global/en/developers/guides/quickstart-base
  DAM_GUIDES_PATH: /content/dam/snowflake-site/developers/guides

jobs:
  publish_quickstart:
    runs-on: ubuntu-latest
    env:
      AEM_USERNAME: ${{ secrets.AEM_USERNAME }}
      AEM_PASSWORD: ${{ secrets.AEM_PASSWORD }}
      AEM_URL: ${{ secrets.AEM_AUTHOR_URL }}
      AEM_PUBLISH_URL: ${{ secrets.AEM_PUBLISH_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          sparse-checkout: |
            site/sfguides/src/${{ inputs.quickstart_name }}
            scripts/aem-staging
          sparse-checkout-cone-mode: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Find markdown file
        id: find_md
        run: |
          md_file=$(find "site/sfguides/src/${{ inputs.quickstart_name }}" -maxdepth 1 -name "*.md" -type f | head -n1)
          if [ -z "$md_file" ]; then
            echo "❌ No markdown file found in ${{ inputs.quickstart_name }}"
            exit 1
          fi
          echo "md_file=$md_file" >> $GITHUB_OUTPUT
          echo "📄 Found markdown: $md_file"

      - name: Parse markdown
        id: parse_md
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          QUICKSTART_NAME: ${{ inputs.quickstart_name }}
          BASE_IMAGE_URL: "https://www.snowflake.com/content/dam/snowflake-site/developers/guides"
        run: |
          python3 scripts/aem-staging/parse_markdown.py \
            "${{ steps.find_md.outputs.md_file }}" \
            --commit-sha "$COMMIT_SHA" \
            --quickstart-name "$QUICKSTART_NAME" \
            --base-image-url "$BASE_IMAGE_URL" \
            --output-json parsed_content.json
          
          echo "📄 Parsed markdown content:"
          cat parsed_content.json

      - name: Prepare AEM payload
        id: prepare_payload
        env:
          LANGUAGE: ${{ inputs.language }}
        run: |
          cf_name="${{ inputs.quickstart_name }}"
          cf_path="${CF_DEST_PATH}/${LANGUAGE}/content-fragments/quickstarts/${cf_name}"
          
          python3 scripts/aem-staging/prepare_aem_payload.py \
            parsed_content.json \
            --content-fragment-path "$cf_path" \
            --language "$LANGUAGE" \
            --output-json aem_payload.json
          
          echo "📦 AEM payload prepared:"
          cat aem_payload.json

      - name: Check if content fragment exists
        id: check_cf
        run: |
          cf_path="${CF_DEST_PATH}/${{ inputs.language }}/content-fragments/quickstarts/${{ inputs.quickstart_name }}"
          
          echo "🔍 Checking if CF exists: $cf_path"
          
          check_code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${AEM_URL}${cf_path}.json" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}")
          
          if [ "$check_code" -eq 200 ]; then
            echo "✅ Content fragment exists"
            echo "cf_exists=true" >> $GITHUB_OUTPUT
          else
            echo "📋 Content fragment does not exist (HTTP $check_code)"
            echo "cf_exists=false" >> $GITHUB_OUTPUT
          fi
          
          echo "cf_path=$cf_path" >> $GITHUB_OUTPUT

      - name: Copy base content fragment (if new)
        if: steps.check_cf.outputs.cf_exists == 'false'
        run: |
          cf_name="${{ inputs.quickstart_name }}"
          dest_path="${CF_DEST_PATH}/${{ inputs.language }}/content-fragments/quickstarts"
          
          echo "📋 Copying base CF to: $dest_path/$cf_name"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${AEM_URL}${BASE_CF_PATH}" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d ":operation=copy" \
            -d ":dest=${dest_path}/${cf_name}" \
            -d ":replace=true" \
            -d "depth=infinity")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP Status: $http_code"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Content fragment copied"
          else
            echo "❌ Copy failed"
            echo "$body"
            exit 1
          fi
          
          sleep 3

      - name: Update content fragment with parsed content
        run: |
          cf_path="${{ steps.check_cf.outputs.cf_path }}"
          
          jq -r '.content_fragment_payload' aem_payload.json > cf_payload.txt
          
          echo "📝 Updating content fragment: $cf_path"
          echo "   Title: $(jq -r '.title' parsed_content.json)"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${AEM_URL}${cf_path}/jcr:content" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-binary @cf_payload.txt)
          
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "❌ Failed to update content fragment"
            echo "$response" | sed '$d'
            exit 1
          fi
          echo "✅ Content fragment updated"

      - name: Check if image folder exists
        id: check_img_folder
        run: |
          dam_folder="${DAM_GUIDES_PATH}/${{ inputs.quickstart_name }}"
          
          check_code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${AEM_URL}${dam_folder}.json" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}")
          
          if [ "$check_code" -eq 200 ]; then
            echo "✅ Image folder exists"
            echo "folder_exists=true" >> $GITHUB_OUTPUT
          else
            echo "📁 Image folder does not exist"
            echo "folder_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload images to AEM DAM
        run: |
          assets_dir="site/sfguides/src/${{ inputs.quickstart_name }}/assets"
          dam_folder="${DAM_GUIDES_PATH}/${{ inputs.quickstart_name }}"
          folder_exists="${{ steps.check_img_folder.outputs.folder_exists }}"
          
          if [ ! -d "$assets_dir" ]; then
            echo "📁 No assets folder found, skipping image upload"
            exit 0
          fi
          
          if [ "$folder_exists" = "false" ]; then
            echo "📁 Creating DAM folder: $dam_folder"
            curl -s -X POST \
              "${AEM_URL}${DAM_GUIDES_PATH}" \
              -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "./jcr:primaryType=sling:Folder" \
              -d ":name=${{ inputs.quickstart_name }}" || true
            
            sleep 2
          fi
          
          for img in "$assets_dir"/*; do
            [ -f "$img" ] || continue
            
            filename=$(basename "$img")
            extension="${filename##*.}"
            extension_lower=$(echo "$extension" | tr '[:upper:]' '[:lower:]')
            
            case "$extension_lower" in
              jpg|jpeg|png|gif|svg|webp|bmp|ico|tiff)
                echo "📤 Uploading: $filename (PUT to overwrite if exists)"
                
                content_type="image/$extension_lower"
                [ "$extension_lower" = "jpg" ] && content_type="image/jpeg"
                [ "$extension_lower" = "svg" ] && content_type="image/svg+xml"
                
                curl -s -X PUT \
                  "${AEM_URL}/api/assets/snowflake-site/developers/guides/${{ inputs.quickstart_name }}/${filename}" \
                  -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
                  -H "Content-Type: ${content_type}" \
                  --data-binary "@${img}" || echo "⚠️ Warning: Failed to upload $filename"
                
                sleep 1
                
                echo "🔄 Reprocessing: $filename"
                curl -s -X POST \
                  "${AEM_URL}/bin/asynccommand" \
                  -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "operation=PROCESS" \
                  -d "asset=${dam_folder}/${filename}" \
                  -d "profile-select=full-process" || true
                
                sleep 1
                
                echo "📢 Publishing image: $filename"
                curl -s -X POST \
                  "${AEM_URL}/bin/replicate.json" \
                  -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "cmd=Activate" \
                  -d "path=${dam_folder}/${filename}" || true
                ;;
              *)
                echo "⏭️ Skipping non-image file: $filename"
                ;;
            esac
          done
          
          echo "✅ Image upload complete"

      - name: Wait for image processing
        run: sleep 15

      - name: Publish content fragment
        run: |
          cf_path="${{ steps.check_cf.outputs.cf_path }}"
          
          echo "📢 Publishing content fragment: $cf_path"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${AEM_URL}/bin/replicate.json" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "cmd=Activate" \
            -d "path=${cf_path}")
          
          http_code=$(echo "$response" | tail -n1)
          echo "HTTP Status: $http_code"
          echo "✅ Content fragment published"

      - name: Check if page exists
        id: check_page
        run: |
          page_path="/content/snowflake-site/global/${{ inputs.language }}/developers/guides/${{ inputs.quickstart_name }}"
          
          echo "🔍 Checking if page exists: $page_path"
          
          check_code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${AEM_URL}${page_path}.json" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}")
          
          if [ "$check_code" -eq 200 ]; then
            echo "✅ Page exists"
            echo "page_exists=true" >> $GITHUB_OUTPUT
          else
            echo "📄 Page does not exist (HTTP $check_code)"
            echo "page_exists=false" >> $GITHUB_OUTPUT
          fi
          
          echo "page_path=$page_path" >> $GITHUB_OUTPUT

      - name: Create page from base (if new)
        if: steps.check_page.outputs.page_exists == 'false'
        run: |
          page_path="${{ steps.check_page.outputs.page_path }}"
          
          echo "📄 Creating page: $page_path"
          echo "   Source: ${PAGE_BASE_PATH}"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${AEM_URL}${PAGE_BASE_PATH}" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d ":operation=copy" \
            -d ":dest=${page_path}" \
            -d ":replace=true")
          
          http_code=$(echo "$response" | tail -n1)
          echo "   Copy HTTP: $http_code"
          
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "❌ Page copy failed"
            echo "$response" | sed '$d'
            exit 1
          fi
          
          echo "✅ Page created"
          sleep 8

      - name: Update page content
        run: |
          page_path="${{ steps.check_page.outputs.page_path }}"
          
          jq -r '.page_payload' aem_payload.json > page_payload.txt
          
          echo "🔗 Updating page: $page_path"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${AEM_URL}${page_path}" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-binary @page_payload.txt)
          
          http_code=$(echo "$response" | tail -n1)
          echo "   Update HTTP: $http_code"
          
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "⚠️ Warning: Page update may have failed"
            echo "$response" | sed '$d'
          fi
          
          echo "✅ Page updated"

      - name: Wait for page processing
        run: sleep 30

      - name: Publish page (if status is Published)
        run: |
          page_path="${{ steps.check_page.outputs.page_path }}"
          status=$(jq -r '.status // "Draft"' parsed_content.json)
          
          echo "📋 Quickstart status: $status"
          
          if [ "$status" = "Published" ]; then
            echo "📢 Publishing page: $page_path"
            
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "${AEM_URL}/bin/replicate.json" \
              -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "cmd=Activate" \
              -d "path=${page_path}")
            
            http_code=$(echo "$response" | tail -n1)
            echo "HTTP Status: $http_code"
            echo "✅ Page published"
          else
            echo "⏭️ Skipping page publish (status is not Published)"
          fi

      - name: Summary
        run: |
          cf_path="${{ steps.check_cf.outputs.cf_path }}"
          page_path="${{ steps.check_page.outputs.page_path }}"
          cf_existed="${{ steps.check_cf.outputs.cf_exists }}"
          page_existed="${{ steps.check_page.outputs.page_exists }}"
          status=$(jq -r '.status // "Draft"' parsed_content.json)
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Publish Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Quickstart: ${{ inputs.quickstart_name }}"
          echo "Language: ${{ inputs.language }}"
          echo "Status: $status"
          echo ""
          echo "Content Fragment: $cf_path"
          echo "  - Was new: $([[ $cf_existed == 'false' ]] && echo 'Yes' || echo 'No')"
          echo ""
          echo "Page: $page_path"
          echo "  - Was new: $([[ $page_existed == 'false' ]] && echo 'Yes' || echo 'No')"
          echo "  - Published: $([[ $status == 'Published' ]] && echo 'Yes' || echo 'No')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
