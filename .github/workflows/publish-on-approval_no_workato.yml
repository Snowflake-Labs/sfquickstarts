name: Publish to AEM (Without Workato)

on:
  push:
    branches: [master]

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_relevant_changes: ${{ steps.detect.outputs.has_relevant_changes }}
      quickstart_names_json: ${{ steps.detect.outputs.quickstart_names_json }}
      relevant_changed_files_json: ${{ steps.detect.outputs.relevant_changed_files_json }}
      has_sidebar_changes: ${{ steps.detect.outputs.has_sidebar_changes }}
      sidebar_json_files: ${{ steps.detect.outputs.sidebar_json_files }}
      journey_guides_json: ${{ steps.detect.outputs.journey_guides_json }}
      has_journey_guides: ${{ steps.detect.outputs.has_journey_guides }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed quickstart folders
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          before_commit="${{ github.event.before }}"
          after_commit="${{ github.sha }}"
          repo="${{ github.repository }}"
          
          files_json=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/compare/${before_commit}...${after_commit}?per_page=300")
          
          changed_files=$(echo "$files_json" | jq -r '
            .files[]? | 
            select(.status != "removed") | 
            .filename | 
            select(startswith("site/sfguides/src/")) | 
            select(test("/_") | not)
          ')
          
          sidebar_json_changed=$(echo "$files_json" | jq -r '
            .files[]? |
            select(.status != "removed") |
            .filename |
            select(startswith("journeys/")) |
            select(endswith(".json"))
          ')
          
          if [ -n "$sidebar_json_changed" ]; then
            echo "has_sidebar_changes=true" >> $GITHUB_OUTPUT
            sidebar_json=$(echo "$sidebar_json_changed" | jq -R -s -c 'split("\n") | map(select(length>0))')
            echo "sidebar_json_files=$sidebar_json" >> $GITHUB_OUTPUT
          else
            echo "has_sidebar_changes=false" >> $GITHUB_OUTPUT
            echo "sidebar_json_files=[]" >> $GITHUB_OUTPUT
          fi
          
          journey_md_changed=$(echo "$files_json" | jq -r '
            .files[]? |
            select(.status != "removed") |
            .filename |
            select(startswith("journeys/")) |
            select(endswith(".md"))
          ')
          
          if [ -n "$journey_md_changed" ]; then
            echo "has_journey_guides=true" >> $GITHUB_OUTPUT
            journey_objs='[]'
            while IFS= read -r md_path; do
              [ -z "$md_path" ] && continue
              folder_path=$(dirname "$md_path")
              guide_name=$(basename "$folder_path")
              lang=""
              if [ -f "$md_path" ]; then
                lang=$(sed -n '1,50p' "$md_path" | grep -m1 -E '^[[:space:]]*language:[[:space:]]*' | sed -E 's/^[[:space:]]*language:[[:space:]]*//')
                lang=$(printf '%s' "$lang" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
              fi
              journey_objs=$(echo "$journey_objs" | jq -c --arg name "$guide_name" --arg lang "$lang" --arg source "$folder_path" '. + [{name:$name, language:$lang, source_path:$source}]')
            done <<< "$journey_md_changed"
            echo "journey_guides_json=$journey_objs" >> $GITHUB_OUTPUT
            has_relevant_changes=true
          else
            echo "has_journey_guides=false" >> $GITHUB_OUTPUT
            echo "journey_guides_json=[]" >> $GITHUB_OUTPUT
          fi
          
          relevant_files=$(echo "$changed_files" | grep -E '^site/sfguides/src/[^/]+/([^/]+\.md|assets/[^/]+\.(jpg|jpeg|png|gif|svg|webp|bmp|ico))$' || true)
          quickstart_names=$(echo "$relevant_files" | sed -E 's|^site/sfguides/src/([^/]+)/.*|\1|' | grep -v '^_' | sort -u)
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Relevant files changed:"
          echo "$relevant_files"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Quickstart folders to publish:"
          echo "$quickstart_names"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          has_relevant_changes=false
          if [ -z "$quickstart_names" ] && [ -z "$sidebar_json_changed" ] && [ -z "$journey_md_changed" ]; then
            quickstart_names_json="[]"
            has_relevant_changes=false
          elif [ -z "$quickstart_names" ]; then
            quickstart_names_json="[]"
            has_relevant_changes=true
          else
            objs='[]'
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              lang=""
              md_file=""
              candidate="site/sfguides/src/$name/$name.md"
              if [ -f "$candidate" ]; then
                md_file="$candidate"
              else
                for f in $(ls -1 "site/sfguides/src/$name"/*.md 2>/dev/null | sort); do
                  if sed -n '1,50p' "$f" | grep -qi -E '^[[:space:]]*language[[:space:]]*:'; then
                    md_file="$f"; break
                  fi
                done
                if [ -z "$md_file" ]; then
                  for f in $(ls -1 "site/sfguides/src/$name"/*.md 2>/dev/null | sort); do
                    [ "$(basename "$f")" = "README.md" ] && continue
                    md_file="$f"; break
                  done
                fi
                if [ -z "$md_file" ]; then
                  md_file=$(ls -1 "site/sfguides/src/$name"/*.md 2>/dev/null | head -n1 || true)
                fi
              fi
              if [ -n "$md_file" ] && [ -f "$md_file" ]; then
                lang=$(sed -n '1,50p' "$md_file" | grep -m1 -E '^[[:space:]]*language:[[:space:]]*' | sed -E 's/^[[:space:]]*language:[[:space:]]*//')
                lang=$(printf '%s' "$lang" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
                if [[ "$lang" =~ ^\".*\"$ ]]; then lang=${lang:1:${#lang}-2}; fi
                if [[ "$lang" =~ ^\'.*\'$ ]]; then lang=${lang:1:${#lang}-2}; fi
              fi
              objs=$(echo "$objs" | jq -c --arg name "$name" --arg lang "$lang" '. + [{name:$name, language:$lang}]')
            done <<< "$quickstart_names"
            quickstart_names_json="$objs"
            has_relevant_changes=true
          fi
          
          echo "quickstart_names_json=$quickstart_names_json" >> $GITHUB_OUTPUT
          echo "has_relevant_changes=$has_relevant_changes" >> $GITHUB_OUTPUT
          relevant_changed_files_json=$(echo "$relevant_files" | jq -R -s -c 'split("\n") | map(select(length>0))')
          echo "relevant_changed_files_json=$relevant_changed_files_json" >> $GITHUB_OUTPUT

  upload_sidebar_json:
    needs: detect_changes
    if: needs.detect_changes.outputs.has_sidebar_changes == 'true'
    runs-on: ubuntu-latest
    env:
      AEM_URL: ${{ secrets.AEM_AUTHOR_URL_PROD }}
      AEM_USERNAME: ${{ secrets.AEM_USERNAME_PROD }}
      AEM_PASSWORD: ${{ secrets.AEM_PASSWORD_PROD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          sparse-checkout: |
            journeys/
            scripts/upload-dam-asset.sh
          sparse-checkout-cone-mode: true

      - name: Create DAM folder if needed
        run: |
          echo "📁 Ensuring DAM folder hierarchy exists"
          
          for folder in "developers" "developers/technical" "developers/technical/guides-navigation"; do
            parent="${folder%/*}"
            name="${folder##*/}"
            
            check=$(curl -s -o /dev/null -w "%{http_code}" \
              "${AEM_URL}/content/dam/snowflake-site/${folder}.json" \
              -u "${AEM_USERNAME}:${AEM_PASSWORD}")
            
            if [ "$check" -eq 200 ]; then
              echo "   ✅ /content/dam/snowflake-site/${folder} exists"
            else
              echo "   📁 Creating: /content/dam/snowflake-site/${folder}"
              curl -s -X POST \
                "${AEM_URL}/api/assets/snowflake-site/${parent}/*" \
                -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
                -H "Content-Type: application/json" \
                -d "{\"class\":\"assetFolder\",\"properties\":{\"name\":\"${name}\",\"title\":\"${name}\"}}"
              sleep 2
            fi
          done
          
          final_check=$(curl -s -o /dev/null -w "%{http_code}" \
            "${AEM_URL}/content/dam/snowflake-site/developers/technical/guides-navigation.json" \
            -u "${AEM_USERNAME}:${AEM_PASSWORD}")
          if [ "$final_check" -eq 200 ]; then
            echo "✅ DAM folder ready"
          else
            echo "❌ Failed to create DAM folder (HTTP $final_check)" >&2
            exit 1
          fi

      - name: Upload sidebar JSON files
        env:
          SIDEBAR_FILES: ${{ needs.detect_changes.outputs.sidebar_json_files }}
        run: |
          echo "$SIDEBAR_FILES" | jq -r '.[]' | while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            echo "📤 Uploading sidebar JSON: $file"
            bash scripts/upload-dam-asset.sh "$file" "snowflake-site/developers/technical/guides-navigation"
          done
          echo "✅ Sidebar JSON upload complete"

      - name: Publish sidebar JSON files
        env:
          SIDEBAR_FILES: ${{ needs.detect_changes.outputs.sidebar_json_files }}
        run: |
          echo "$SIDEBAR_FILES" | jq -r '.[]' | while IFS= read -r file; do
            [ -z "$file" ] && continue
            filename=$(basename "$file")
            dam_path="/content/dam/snowflake-site/developers/technical/guides-navigation/${filename}"
            echo "📢 Publishing: $dam_path"
            curl -s -X POST \
              "${AEM_URL}/bin/replicate.json" \
              -u "${AEM_USERNAME}:${AEM_PASSWORD}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "cmd=Activate" \
              -d "path=${dam_path}" || echo "⚠️ Publish failed for $filename"
          done
          echo "✅ Sidebar JSON publish complete"

  publish_to_aem:
    needs: detect_changes
    if: |
      needs.detect_changes.outputs.has_relevant_changes == 'true' &&
      needs.detect_changes.outputs.quickstart_names_json != '[]'
    strategy:
      matrix:
        quickstart: ${{ fromJson(needs.detect_changes.outputs.quickstart_names_json) }}
      max-parallel: 1
      fail-fast: false
    uses: ./.github/workflows/publish-to-aem.yml
    with:
      quickstart_name: ${{ matrix.quickstart.name }}
      language: ${{ matrix.quickstart.language || 'en' }}
      commit_sha: ${{ github.sha }}
      base_image_url: ${{ vars.AEM_BASE_IMAGE_URL }}
    secrets:
      AEM_USERNAME: ${{ secrets.AEM_USERNAME_PROD }}
      AEM_PASSWORD: ${{ secrets.AEM_PASSWORD_PROD }}
      AEM_AUTHOR_URL: ${{ secrets.AEM_AUTHOR_URL_PROD }}
      AEM_PUBLISH_URL: ${{ secrets.AEM_PUBLISH_URL_PROD }}

  publish_journey_guides:
    needs: detect_changes
    if: needs.detect_changes.outputs.has_journey_guides == 'true'
    strategy:
      matrix:
        guide: ${{ fromJson(needs.detect_changes.outputs.journey_guides_json) }}
      max-parallel: 1
      fail-fast: false
    uses: ./.github/workflows/publish-to-aem.yml
    with:
      quickstart_name: ${{ matrix.guide.name }}
      language: ${{ matrix.guide.language || 'en' }}
      commit_sha: ${{ github.sha }}
      base_image_url: ${{ vars.AEM_BASE_IMAGE_URL }}
      source_path: ${{ matrix.guide.source_path }}
      page_base_path: /content/snowflake-site/global/en/developers/guides/journey-sidebar-base
    secrets:
      AEM_USERNAME: ${{ secrets.AEM_USERNAME_PROD }}
      AEM_PASSWORD: ${{ secrets.AEM_PASSWORD_PROD }}
      AEM_AUTHOR_URL: ${{ secrets.AEM_AUTHOR_URL_PROD }}
      AEM_PUBLISH_URL: ${{ secrets.AEM_PUBLISH_URL_PROD }}
